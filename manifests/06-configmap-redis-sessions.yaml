# Redis configuration for the "sessions" replication set (StatefulSet redis-sessions).
apiVersion: v1
kind: ConfigMap
metadata:
  name: redis-config-sessions
  namespace: redis-sessions
  labels:
    app.kubernetes.io/name: redis-config-sessions
data:
  redis.conf: |
    # --- Network ---
    protected-mode no
    port 6379

    # --- Persistence ---
    appendonly yes
    dir /data
    aof-use-rdb-preamble yes

    # --- Fast reload ---
    rdbcompression no
    rdbchecksum no
    aof-load-truncated yes
    loading-process-events-interval-bytes 4194304

    # --- I/O ---
    io-threads 4

    # --- Memory ---
    maxmemory 6gb
    maxmemory-policy allkeys-lru

    # --- Background ---
    hz 20
    activerehashing yes
    lazyfree-lazy-eviction yes
    lazyfree-lazy-expire yes
    lazyfree-lazy-server-del yes

    # --- Replication transport (controller owns role assignment) ---
    repl-diskless-sync yes
    repl-diskless-sync-delay 5
    repl-backlog-size 32mb
    repl-backlog-ttl 3600
    repl-timeout 60
    client-output-buffer-limit replica 256mb 128mb 60
