# Example Redis topology managed by the controller.
#
# - "redis" is a headless Service used by the StatefulSet for stable network IDs.
# - "redis-read" selects all Redis Pods (handy for read-only traffic).
# - The StatefulSet runs 3 plain Redis servers; the controller decides which one
#   is master and reconfigures replication. No Sentinel is involved.
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: redis
  labels:
    app: redis
spec:
  clusterIP: None # headless
  selector:
    app: redis
  ports:
    - name: redis
      port: 6379
      targetPort: 6379
---
apiVersion: v1
kind: Service
metadata:
  name: redis-read
  namespace: redis
  labels:
    app: redis
spec:
  type: ClusterIP
  selector:
    app: redis
  ports:
    - name: redis
      port: 6379
      targetPort: 6379
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: redis
  namespace: redis
  labels:
    app: redis
spec:
  serviceName: redis
  replicas: 3
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
        # NOTE: redis-current-role is intentionally NOT set here.
        # The controller owns that label.
    spec:
      terminationGracePeriodSeconds: 10
      containers:
        - name: redis
          image: redis:7-alpine
          # protected-mode must be off so the controller (a different Pod) can
          # connect without auth. Persistence is disabled to keep the example
          # cluster-agnostic; enable AOF/RDB + a PVC for real workloads.
          command: ["redis-server"]
          args:
            - "--protected-mode"
            - "no"
            - "--appendonly"
            - "no"
            - "--save"
            - ""
          ports:
            - name: redis
              containerPort: 6379
          volumeMounts:
            - name: data
              mountPath: /data
          readinessProbe:
            exec:
              command: ["redis-cli", "-h", "127.0.0.1", "-p", "6379", "ping"]
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            exec:
              command: ["redis-cli", "-h", "127.0.0.1", "-p", "6379", "ping"]
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
      volumes:
        - name: data
          emptyDir: {}
      # For real workloads replace the emptyDir volume above with a
      # volumeClaimTemplates entry, e.g.:
      #
      # volumeClaimTemplates:
      #   - metadata:
      #       name: data
      #     spec:
      #       accessModes: ["ReadWriteOnce"]
      #       resources:
      #         requests:
      #           storage: 1Gi
