# Second, fully independent replication set ("sessions") managed by the SAME
# controller as the "cache" set in redis-statefulset-example.yaml — but placed
# in a SEPARATE namespace (redis-sessions) to demonstrate cross-namespace
# management.
#
# The controller (Deployment + ServiceAccount in namespace "redis") only reaches
# this namespace because:
#   1. REDIS_NAMESPACES on the Deployment lists "redis-sessions", and
#   2. the Role + RoleBinding below grant its ServiceAccount Pod get/list/watch/
#      patch *in this namespace only* (least privilege — no ClusterRole).
#
# A set's identity is (namespace, redis-set label), so this "sessions" set and
# the "cache" set never merge and the controller never replicates across
# namespaces. Each set keeps its own master, failure timer and failover epoch.
---
apiVersion: v1
kind: Namespace
metadata:
  name: redis-sessions
  labels:
    app.kubernetes.io/part-of: redis-replication-controller
---
# Grant the controller's ServiceAccount (in namespace "redis") the rights it
# needs on Redis Pods in THIS namespace. No lease permissions here — leader
# election stays in the controller's own namespace.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: redis-replication-controller
  namespace: redis-sessions
  labels:
    app.kubernetes.io/name: redis-replication-controller
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch", "patch", "update"]
  - apiGroups: [""]
    resources: ["services"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["discovery.k8s.io"]
    resources: ["endpointslices"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: redis-replication-controller
  namespace: redis-sessions
  labels:
    app.kubernetes.io/name: redis-replication-controller
subjects:
  - kind: ServiceAccount
    name: redis-replication-controller
    namespace: redis # the controller's SA lives in the "redis" namespace
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: redis-replication-controller
---
apiVersion: v1
kind: Service
metadata:
  name: redis-sessions # headless Service for stable StatefulSet network IDs.
  namespace: redis-sessions
  labels:
    app: redis
    redis-set: sessions
spec:
  clusterIP: None
  selector:
    app: redis
    redis-set: sessions
  ports:
    - name: redis
      port: 6379
      targetPort: 6379
---
# Stable write endpoint for the "sessions" set's current master.
apiVersion: v1
kind: Service
metadata:
  name: redis-write-sessions
  namespace: redis-sessions
  labels:
    app.kubernetes.io/name: redis-write-sessions
spec:
  type: ClusterIP
  selector:
    app: redis
    redis-set: sessions
    redis-current-role: master
  ports:
    - name: redis
      port: 6379
      targetPort: 6379
      protocol: TCP
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: redis-sessions
  namespace: redis-sessions
  labels:
    app: redis
    redis-set: sessions
spec:
  serviceName: redis-sessions
  replicas: 3
  selector:
    matchLabels:
      app: redis
      redis-set: sessions
  template:
    metadata:
      labels:
        app: redis
        # Groups these Pods into the "sessions" replication set.
        redis-set: sessions
        # redis-current-role is owned by the controller; do not set it here.
    spec:
      terminationGracePeriodSeconds: 10
      containers:
        - name: redis
          image: redis:7.4.3-bookworm
          # Plain redis-server, NO role decision here (no --replicaof). Every Pod
          # boots as a standalone master; the controller elects one per set.
          command: ["redis-server"]
          args:
            - "--protected-mode"
            - "no"
            - "--appendonly"
            - "yes"
            - "--dir"
            - "/data"
            # OPTIONAL consistency knob (off by default). Setting these makes a
            # master refuse writes once it loses all replicas, which self-fences
            # a partitioned old master after a failover and shrinks the
            # split-brain data-loss window. The trade-off is availability: a lone
            # surviving Pod would also refuse writes, so leave these commented if
            # "keep serving down to one Pod" matters more than consistency.
            # - "--min-replicas-to-write"
            # - "1"
            # - "--min-replicas-max-lag"
            # - "10"
          ports:
            - name: redis
              containerPort: 6379
          volumeMounts:
            - name: redis-data
              mountPath: /data
          readinessProbe:
            exec:
              command: ["redis-cli", "-h", "127.0.0.1", "-p", "6379", "ping"]
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            exec:
              command: ["redis-cli", "-h", "127.0.0.1", "-p", "6379", "ping"]
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
  volumeClaimTemplates:
    - metadata:
        name: redis-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 1Gi
