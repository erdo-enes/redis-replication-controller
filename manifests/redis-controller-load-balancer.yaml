apiVersion: v1
kind: Service
metadata:
  name: redis-write-ext
  namespace: redis
  labels:
    app.kubernetes.io/name: redis-write-ext
spec:
  type: LoadBalancer
  selector:
    app: redis
    redis-current-role: master
  ports:
    - name: redis
      port: 6379
      targetPort: 6379
      protocol: TCP