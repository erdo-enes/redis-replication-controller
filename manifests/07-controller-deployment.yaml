apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis-replication-controller
  namespace: redis-test-enes
  labels:
    app.kubernetes.io/name: redis-replication-controller
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: redis-replication-controller
  template:
    metadata:
      labels:
        app.kubernetes.io/name: redis-replication-controller
    spec:
      serviceAccountName: redis-replication-controller
      imagePullSecrets:
        - name: regcred
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: controller
          image: harbor-enes-k8s.local/test/redis-rep:v1
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          envFrom:
            - configMapRef:
                name: controller-config
          env:
            # Unique identity per replica for leader election — must be a
            # fieldRef because it references the Pod's own name (dynamic).
            - name: CONTROLLER_ID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
          ports:
            - name: health
              containerPort: 8081
          livenessProbe:
            httpGet:
              path: /healthz
              port: health
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /readyz
              port: health
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 25m
              memory: 32Mi
            limits:
              cpu: 200m
              memory: 128Mi
