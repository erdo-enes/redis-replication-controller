apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis-replication-controller
  namespace: redis
  labels:
    app.kubernetes.io/name: redis-replication-controller
spec:
  # Two replicas for availability; leader election ensures only one acts.
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: redis-replication-controller
  template:
    metadata:
      labels:
        app.kubernetes.io/name: redis-replication-controller
    spec:
      serviceAccountName: redis-replication-controller
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: controller
          image: redis-replication-controller:latest
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          env:
            - name: REDIS_NAMESPACE
              value: "redis"
            - name: REDIS_POD_LABEL_SELECTOR
              value: "app=redis"
            - name: REDIS_PORT
              value: "6379"
            - name: REDIS_WRITE_SERVICE_NAME
              value: "redis-write"
            - name: RECONCILE_INTERVAL_SECONDS
              value: "10"
            - name: MASTER_FAILURE_THRESHOLD_SECONDS
              value: "15"
            - name: REDIS_CONNECT_TIMEOUT_SECONDS
              value: "2"
            - name: REDIS_COMMAND_TIMEOUT_SECONDS
              value: "2"
            # Unique identity per replica for leader election.
            - name: CONTROLLER_ID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: ENABLE_LEADER_ELECTION
              value: "true"
            - name: LEASE_NAME
              value: "redis-replication-controller"
            - name: LEASE_NAMESPACE
              value: "redis"
            # first-healthy | lowest-pod-ordinal | annotation-preferred
            - name: INITIAL_MASTER_STRATEGY
              value: "lowest-pod-ordinal"
            # Persist replication role via CONFIG REWRITE (see README caveats).
            - name: ENABLE_CONFIG_REWRITE
              value: "false"
            - name: HEALTH_PROBE_ADDR
              value: ":8081"
            - name: LOG_LEVEL
              value: "info"
          ports:
            - name: health
              containerPort: 8081
          livenessProbe:
            httpGet:
              path: /healthz
              port: health
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /readyz
              port: health
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 25m
              memory: 32Mi
            limits:
              cpu: 200m
              memory: 128Mi
