# Example Redis topology managed by the controller.
#
# IMPORTANT: the Pods do NOT decide their own replication role. Every Pod boots
# as a plain `redis-server` (a standalone master). The controller then elects a
# single master, issues REPLICAOF to the others, and moves the
# `redis-current-role=master` label so the redis-write Service follows it.
#kendi
# Do NOT add `--replicaof` or an "if HOSTNAME == redis-0" startup script here:
# that hardcodes redis-0 as master forever and fights the controller's failover
# (a restarted redis-0 would come back as a second master => split-brain).
#
# - "redis"      : headless Service for stable StatefulSet network IDs.
# - "redis-read" : selects all Pods (handy for read-only / replica traffic).
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: redis-test-enes
  labels:
    app: redis
spec:
  clusterIP: None # headless
  selector:
    app: redis
  ports:
    - name: redis
      port: 6379
      targetPort: 6379
---
apiVersion: v1
kind: Service
metadata:
  name: redis-read
  namespace: redis-test-enes
  labels:
    app: redis
spec:
  type: ClusterIP
  selector:
    app: redis
  ports:
    - name: redis
      port: 6379
      targetPort: 6379
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: redis
  namespace: redis-test-enes
  labels:
    app: redis
spec:
  serviceName: redis
  replicas: 3
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
        # redis-set groups these Pods into one replication set named "cache".
        # The controller elects a master per set; redis-write-cache routes to it.
        # A second StatefulSet with redis-set: sessions is reconciled fully
        # independently by the same controller (see 06-redis-sessions.yaml).
        redis-set: cache
        # NOTE: redis-current-role is intentionally NOT set here.
        # The controller owns that label and routes redis-write with it.
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9121"
    spec:
      terminationGracePeriodSeconds: 10

      # Spread the 3 Redis Pods across different nodes so one node failure cannot
      # take out master + replicas at once.
      # NOTE: "required" needs at least 3 schedulable nodes or Pods stay Pending.
      # On a smaller cluster switch to preferredDuringSchedulingIgnoredDuringExecution.
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchExpressions:
                  - key: app
                    operator: In
                    values: ["redis"]
              topologyKey: kubernetes.io/hostname

      # redis_exporter as a native sidecar (Kubernetes >= 1.29; on 1.28 enable the
      # SidecarContainers feature gate). It scrapes the local redis over
      # localhost:6379 and exposes Prometheus metrics on :9121.
      # If your cluster predates native sidecars, move this entry into the
      # `containers:` list below instead.
      initContainers:
        - name: redis-exporter
          image: oliver006/redis_exporter:latest
          restartPolicy: Always # makes this a sidecar, not a run-once init container
          env:
            - name: REDIS_ADDR
              value: "redis://localhost:6379"
          ports:
            - name: metrics
              containerPort: 9121
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 100m
              memory: 64Mi

      containers:
        - name: redis
          image: redis:7.4.3-bookworm
          # Plain redis-server, NO role decision here. protected-mode must be off
          # so the controller (running in a different Pod) can connect without a
          # password. AOF persistence is enabled because we use a real PVC below.
          command: ["redis-server"]
          args:
            - "--protected-mode"
            - "no"
            - "--appendonly"
            - "yes"
            - "--dir"
            - "/data"
            # --- Fast reload ---
            # RDB-format preamble so restart loads a snapshot, not replays AOF.
            - "--aof-use-rdb-preamble"
            - "yes"
            # No LZF compression — larger RDB file on disk, but no decompression
            # overhead on load. On PVC-backed fast storage this is faster overall.
            - "--rdbcompression"
            - "no"
            # Skip CRC64 checksum during RDB load (~10–20 % faster).
            - "--rdbchecksum"
            - "no"
            # Skip validation on truncated AOF (safe on reliable PVC).
            - "--aof-load-truncated"
            - "yes"
            # Process server events only every 4 MB loaded instead of 512 KB,
            # giving more throughput to the load itself.
            - "--loading-process-events-interval-bytes"
            - "4194304"
            # Periodic RDB snapshots (triggers AOF rewrite which produces the
            # RDB preamble, keeping the AOF file small and fresh).
            - "--save"
            - "900"
            - "1"
            - "--save"
            - "300"
            - "10"
            - "--save"
            - "60"
            - "10000"
            # --- I/O ---
            - "--io-threads"
            - "4"
            # --- Memory ---
            - "--maxmemory"
            - "6gb"
            - "--maxmemory-policy"
            - "allkeys-lru"
            # --- Background ---
            - "--hz"
            - "20"
            - "--activerehashing"
            - "yes"
            - "--lazyfree-lazy-eviction"
            - "yes"
            - "--lazyfree-lazy-expire"
            - "yes"
            - "--lazyfree-lazy-server-del"
            - "yes"
            # --- Replication transport (safe: only affects HOW data moves, not
            # WHO is master. The controller owns role assignment via REPLICAOF.) ---
            # Diskless sync: master streams RDB directly to replica sockets
            # instead of writing to disk first. Faster initial sync.
            - "--repl-diskless-sync"
            - "yes"
            # Wait 5s for additional replicas to join before starting sync.
            - "--repl-diskless-sync-delay"
            - "5"
            # 64 MB replication backlog — allows partial resync after brief
            # disconnects instead of full RDB transfer. For 10 GB datasets,
            # a full resync is expensive; the backlog avoids it for short blips.
            - "--repl-backlog-size"
            - "64mb"
            # Keep backlog for 1 hour after last replica disconnects.
            - "--repl-backlog-ttl"
            - "3600"
            # Replication timeout: disconnect replica after 60s of no response.
            - "--repl-timeout"
            - "60"
            # 512 MB output buffer per replica (hard limit). Prevents a slow
            # replica from being killed mid-sync with a large dataset.
            - "--client-output-buffer-limit"
            - "replica"
            - "512mb"
            - "256mb"
            - "60"
            # OPTIONAL consistency knob (off by default). Makes a master refuse
            # writes once it loses all replicas, self-fencing a partitioned old
            # master after failover and shrinking the split-brain data-loss
            # window. Trade-off: a lone surviving Pod also refuses writes, so
            # leave commented if "serve down to one Pod" outranks consistency.
            # - "--min-replicas-to-write"
            # - "1"
            # - "--min-replicas-max-lag"
            # - "10"
          ports:
            - name: redis
              containerPort: 6379
          volumeMounts:
            - name: redis-data
              mountPath: /data
          readinessProbe:
            exec:
              command: ["redis-cli", "-h", "127.0.0.1", "-p", "6379", "ping"]
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            exec:
              command: ["redis-cli", "-h", "127.0.0.1", "-p", "6379", "ping"]
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              cpu: 2000m
              memory: 4Gi
            limits:
              cpu: 4000m
              memory: 8Gi

  volumeClaimTemplates:
    - metadata:
        name: redis-data
      spec:
        storageClassName: csi-rbd-sc
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 20Gi
