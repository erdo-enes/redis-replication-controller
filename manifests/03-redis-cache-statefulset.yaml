# Example Redis topology managed by the controller.
#
# IMPORTANT: the Pods do NOT decide their own replication role. Every Pod boots
# as a plain `redis-server` (a standalone master). The controller then elects a
# single master, issues REPLICAOF to the others, and moves the
# `redis-current-role=master` label so the redis-write Service follows it.
#kendi
# Do NOT add `--replicaof` or an "if HOSTNAME == redis-0" startup script here:
# that hardcodes redis-0 as master forever and fights the controller's failover
# (a restarted redis-0 would come back as a second master => split-brain).
#
# - "redis"      : headless Service for stable StatefulSet network IDs.
# - "redis-read" : selects all Pods (handy for read-only / replica traffic).
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: redis-test-enes
  labels:
    app: redis
spec:
  clusterIP: None # headless
  selector:
    app: redis
  ports:
    - name: redis
      port: 6379
      targetPort: 6379
---
apiVersion: v1
kind: Service
metadata:
  name: redis-read
  namespace: redis-test-enes
  labels:
    app: redis
spec:
  type: ClusterIP
  selector:
    app: redis
  ports:
    - name: redis
      port: 6379
      targetPort: 6379
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: redis
  namespace: redis-test-enes
  labels:
    app: redis
spec:
  serviceName: redis
  replicas: 3
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
        # redis-set groups these Pods into one replication set named "cache".
        # The controller elects a master per set; redis-write-cache routes to it.
        # A second StatefulSet with redis-set: sessions is reconciled fully
        # independently by the same controller (see 06-redis-sessions.yaml).
        redis-set: cache
        # NOTE: redis-current-role is intentionally NOT set here.
        # The controller owns that label and routes redis-write with it.
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9121"
    spec:
      terminationGracePeriodSeconds: 10

      # Spread the 3 Redis Pods across different nodes so one node failure cannot
      # take out master + replicas at once.
      # NOTE: "required" needs at least 3 schedulable nodes or Pods stay Pending.
      # On a smaller cluster switch to preferredDuringSchedulingIgnoredDuringExecution.
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchExpressions:
                  - key: app
                    operator: In
                    values: ["redis"]
              topologyKey: kubernetes.io/hostname

      # redis_exporter as a native sidecar (Kubernetes >= 1.29; on 1.28 enable the
      # SidecarContainers feature gate). It scrapes the local redis over
      # localhost:6379 and exposes Prometheus metrics on :9121.
      # If your cluster predates native sidecars, move this entry into the
      # `containers:` list below instead.
      initContainers:
        - name: redis-exporter
          image: oliver006/redis_exporter:latest
          restartPolicy: Always # makes this a sidecar, not a run-once init container
          env:
            - name: REDIS_ADDR
              value: "redis://localhost:6379"
          ports:
            - name: metrics
              containerPort: 9121
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 100m
              memory: 64Mi

      containers:
        - name: redis
          image: redis:7.4.3-bookworm
          # NO role decision here — every Pod boots as a standalone master.
          # The controller elects one master per set via REPLICAOF at runtime.
          # Config lives in ConfigMap redis-config-cache so it can be updated
          # without rolling the StatefulSet (just restart the Pods).
          command: ["redis-server"]
          args: ["/etc/redis/redis.conf"]
          ports:
            - name: redis
              containerPort: 6379
          volumeMounts:
            - name: redis-config
              mountPath: /etc/redis
              readOnly: true
            - name: redis-data
              mountPath: /data
          readinessProbe:
            exec:
              command: ["redis-cli", "-h", "127.0.0.1", "-p", "6379", "ping"]
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            exec:
              command: ["redis-cli", "-h", "127.0.0.1", "-p", "6379", "ping"]
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              cpu: 2000m
              memory: 4Gi
            limits:
              cpu: 4000m
              memory: 8Gi

      volumes:
        - name: redis-config
          configMap:
            name: redis-config-cache

  volumeClaimTemplates:
    - metadata:
        name: redis-data
      spec:
        storageClassName: csi-rbd-sc
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 20Gi
