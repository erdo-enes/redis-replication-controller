# Minimum permissions, scoped to a single namespace (Role, not ClusterRole).
# This Role covers the controller's HOME namespace ("redis-test-enes"): the Lease for
# leader election plus the Redis Pods of any set living here (e.g. "cache").
# For each ADDITIONAL namespace in REDIS_NAMESPACES, create a Pods-only Role +
# RoleBinding to this same ServiceAccount in that namespace — see
# 06-redis-sessions.yaml for the "redis-sessions" example. Using
# per-namespace Roles (instead of one ClusterRole) keeps the controller's reach
# limited to exactly the namespaces you opt in.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: redis-replication-controller
  namespace: redis-test-enes
  labels:
    app.kubernetes.io/name: redis-replication-controller
rules:
  # Discover Redis Pods and patch their role labels/annotations.
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch", "patch", "update"]
  # Read the redis-write Service (informational / future use).
  - apiGroups: [""]
    resources: ["services"]
    verbs: ["get", "list", "watch"]
  # Validate that redis-write routes only to the current master.
  - apiGroups: ["discovery.k8s.io"]
    resources: ["endpointslices"]
    verbs: ["get", "list", "watch"]
  # Leader election via the coordination.k8s.io Lease API.
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: redis-replication-controller
  namespace: redis-test-enes
  labels:
    app.kubernetes.io/name: redis-replication-controller
subjects:
  - kind: ServiceAccount
    name: redis-replication-controller
    namespace: redis-test-enes
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: redis-replication-controller
